{% extends 'teams/base.html' %}
{% block content %}
<div class="m-card">
    <h1 style="color: #38bdf8;">{{ team.name }}</h1>
    <p style="color: #94a3b8;">Country: {{ team.country }} | Stadium: {{ team.stadium }}</p>
</div>

<h2 class="section-title" style="margin-top: 30px;"><span></span> Squad Members</h2>
<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;">
    {% for player in players %}
    <a href="{% url 'player_detail' player.id %}" class="m-card" style="text-decoration: none; display: block;">
        <h4 style="color: white;">{{ player.full_name }}</h4>
        <small style="color: #38bdf8;">{{ player.get_position_display }}</small>
    </a>
    {% endfor %}
</div>
<a href="/" style="display: inline-block; margin-top: 20px; color: #94a3b8;">← Back to Dashboard</a>
{% endblock %}
